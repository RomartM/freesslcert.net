name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pg-service-on-runner
  cancel-in-progress: false


  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum
      - run: cd backend && go test ./... -v -race

  build-and-push:
    needs: test
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        server:
          - { name: us-east, host: "100.111.72.8" }
          - { name: eu-west, host: "100.121.100.24" }
          - { name: uk, host: "100.115.122.115" }
          - { name: sg, host: "100.104.55.72" }
          - { name: jp, host: "100.73.47.28" }
          - { name: au-syd, host: "100.120.168.37" }
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy to ${{ matrix.server.name }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key \
            deploy-freesslcert@${{ matrix.server.host }} \
            'cd /opt/freesslcert && docker compose pull && docker compose up -d --force-recreate && docker image prune -f'
